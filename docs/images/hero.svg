<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="-apple-system, 'SF Pro Text', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0d10"/>
      <stop offset="0.55" stop-color="#13171c"/>
      <stop offset="1" stop-color="#1a1410"/>
    </linearGradient>
    <radialGradient id="amberGlow" cx="0.85" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#d7bc84" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d7bc84" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0.18" cy="0.82" r="0.55">
      <stop offset="0" stop-color="#5cb3ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5cb3ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="popoverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26282a" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0d1112" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="hudGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1d20"/>
      <stop offset="1" stop-color="#262a2e"/>
    </linearGradient>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  <rect width="1280" height="720" fill="url(#amberGlow)"/>
  <rect width="1280" height="720" fill="url(#blueGlow)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Mac menu bar -->
  <rect x="0" y="0" width="1280" height="28" fill="#0c0e10" fill-opacity="0.85"/>
  <text x="20" y="19" font-size="13" fill="#e4e4e1" font-weight="600">Sarah</text>
  <text x="80" y="19" font-size="13" fill="#9ca09b">File</text>
  <text x="120" y="19" font-size="13" fill="#9ca09b">Edit</text>
  <text x="160" y="19" font-size="13" fill="#9ca09b">View</text>
  <!-- right side menu icons -->
  <g transform="translate(1080, 14)">
    <circle cx="0" cy="0" r="3" fill="#d7bc84"/>
    <path d="M-3 -8 Q-1 -12, 1 -10 T 6 -2" stroke="#d7bc84" stroke-width="1.5" fill="none"/>
  </g>
  <text x="1100" y="19" font-size="12" fill="#d7bc84" font-weight="600">Sarah</text>
  <text x="1150" y="19" font-size="12" fill="#9ca09b">Wi-Fi</text>
  <text x="1190" y="19" font-size="12" fill="#9ca09b">100%</text>
  <text x="1232" y="19" font-size="12" fill="#9ca09b">2:34</text>

  <!-- Tagline (top-left) -->
  <text x="80" y="170" font-size="60" font-weight="800" fill="#fafaf6">Sarah</text>
  <text x="80" y="218" font-size="22" font-weight="500" fill="#d7bc84">The Siri you actually wanted.</text>
  <text x="80" y="262" font-size="15" fill="#a5aaa3" font-weight="400">macOS menu bar voice assistant • dictate, command, ask</text>

  <text x="80" y="340" font-size="13" fill="#7d8480" font-weight="600" letter-spacing="2">PRESS · SPEAK · DONE</text>

  <!-- Mode chips -->
  <g transform="translate(80, 360)">
    <rect width="180" height="46" rx="11" fill="#1a1d21" stroke="#3a3e41" stroke-width="1"/>
    <circle cx="22" cy="23" r="5" fill="#5cb3ff"/>
    <text x="40" y="23" font-size="13" fill="#fafaf6" font-weight="600">Dictation</text>
    <text x="40" y="38" font-size="11" fill="#909590">Right Ctrl · insert text</text>
  </g>
  <g transform="translate(280, 360)">
    <rect width="180" height="46" rx="11" fill="#1a1d21" stroke="#3a3e41" stroke-width="1"/>
    <circle cx="22" cy="23" r="5" fill="#d7bc84"/>
    <text x="40" y="23" font-size="13" fill="#fafaf6" font-weight="600">Command</text>
    <text x="40" y="38" font-size="11" fill="#909590">+ Shift · run agent</text>
  </g>
  <g transform="translate(480, 360)">
    <rect width="180" height="46" rx="11" fill="#1a1d21" stroke="#3a3e41" stroke-width="1"/>
    <circle cx="22" cy="23" r="5" fill="#5ee2b7"/>
    <text x="40" y="23" font-size="13" fill="#fafaf6" font-weight="600">Quick Ask</text>
    <text x="40" y="38" font-size="11" fill="#909590">+ Space · ask AI</text>
  </g>

  <!-- Floating HUD capsule (lower right) -->
  <g transform="translate(560, 600)">
    <rect width="180" height="48" rx="24" fill="url(#hudGrad)" stroke="#3a3e41" stroke-width="1"/>
    <circle cx="24" cy="24" r="9" fill="#d7bc84"/>
    <circle cx="24" cy="24" r="4" fill="#0a0d10"/>
    <!-- waveform -->
    <g transform="translate(46, 24)">
      <rect x="0" y="-4" width="2" height="8" rx="1" fill="#d7bc84"/>
      <rect x="6" y="-8" width="2" height="16" rx="1" fill="#d7bc84"/>
      <rect x="12" y="-12" width="2" height="24" rx="1" fill="#d7bc84"/>
      <rect x="18" y="-6" width="2" height="12" rx="1" fill="#d7bc84"/>
      <rect x="24" y="-10" width="2" height="20" rx="1" fill="#d7bc84"/>
      <rect x="30" y="-7" width="2" height="14" rx="1" fill="#d7bc84"/>
      <rect x="36" y="-4" width="2" height="8" rx="1" fill="#d7bc84"/>
      <rect x="42" y="-9" width="2" height="18" rx="1" fill="#d7bc84"/>
      <rect x="48" y="-12" width="2" height="24" rx="1" fill="#d7bc84"/>
      <rect x="54" y="-6" width="2" height="12" rx="1" fill="#d7bc84"/>
      <rect x="60" y="-3" width="2" height="6" rx="1" fill="#d7bc84"/>
      <rect x="66" y="-8" width="2" height="16" rx="1" fill="#d7bc84"/>
      <rect x="72" y="-5" width="2" height="10" rx="1" fill="#d7bc84"/>
      <rect x="78" y="-9" width="2" height="18" rx="1" fill="#d7bc84"/>
      <rect x="84" y="-7" width="2" height="14" rx="1" fill="#d7bc84"/>
      <rect x="90" y="-4" width="2" height="8" rx="1" fill="#d7bc84"/>
      <rect x="96" y="-10" width="2" height="20" rx="1" fill="#d7bc84"/>
      <rect x="102" y="-6" width="2" height="12" rx="1" fill="#d7bc84"/>
      <rect x="108" y="-3" width="2" height="6" rx="1" fill="#d7bc84"/>
      <rect x="114" y="-7" width="2" height="14" rx="1" fill="#d7bc84"/>
    </g>
  </g>

  <!-- Menubar popover (right) -->
  <g transform="translate(870, 60)">
    <!-- arrow -->
    <path d="M165 -2 L172 8 L158 8 Z" fill="#26282a" fill-opacity="0.96"/>
    <rect width="330" height="500" rx="18" fill="url(#popoverGrad)" stroke="#fff" stroke-opacity="0.13" stroke-width="1"/>
    <rect x="1" y="1" width="328" height="498" rx="17" fill="url(#grid)" opacity="0.4"/>

    <!-- Header -->
    <text x="22" y="40" font-size="11" letter-spacing="2" fill="#7d8480" font-weight="700">SARAH</text>
    <text x="22" y="68" font-size="20" fill="#fafaf6" font-weight="700">Listening</text>
    <circle cx="295" cy="40" r="5" fill="#d7bc84"/>

    <!-- Status panel -->
    <rect x="18" y="90" width="294" height="80" rx="13" fill="#0d1014" stroke="#fff" stroke-opacity="0.06"/>
    <text x="34" y="115" font-size="11" letter-spacing="1.5" fill="#7d8480" font-weight="700">CURRENT MODE</text>
    <text x="34" y="138" font-size="15" fill="#fafaf6" font-weight="600">Dictation</text>
    <text x="34" y="156" font-size="11" fill="#9ca09b">Right Ctrl · press to start, press to stop</text>

    <!-- Action buttons -->
    <g transform="translate(18, 188)">
      <rect width="142" height="58" rx="12" fill="#5cb3ff" fill-opacity="0.14" stroke="#5cb3ff" stroke-opacity="0.4"/>
      <text x="14" y="26" font-size="11" fill="#9ec5f0" font-weight="600" letter-spacing="1">DICTATE</text>
      <text x="14" y="46" font-size="13" fill="#fafaf6" font-weight="600">Start recording</text>
    </g>
    <g transform="translate(170, 188)">
      <rect width="142" height="58" rx="12" fill="#d7bc84" fill-opacity="0.12" stroke="#d7bc84" stroke-opacity="0.32"/>
      <text x="14" y="26" font-size="11" fill="#d7bc84" font-weight="600" letter-spacing="1">COMMAND</text>
      <text x="14" y="46" font-size="13" fill="#fafaf6" font-weight="600">Run agent</text>
    </g>

    <!-- Status rows -->
    <text x="22" y="280" font-size="11" letter-spacing="2" fill="#7d8480" font-weight="700">STATUS</text>
    <g transform="translate(22, 296)">
      <circle cx="6" cy="14" r="4" fill="#5ee2b7"/>
      <text x="22" y="18" font-size="13" fill="#e4e4e1">Speech</text>
      <text x="270" y="18" font-size="12" fill="#9ca09b" text-anchor="end">Volcengine</text>
    </g>
    <g transform="translate(22, 322)">
      <circle cx="6" cy="14" r="4" fill="#5ee2b7"/>
      <text x="22" y="18" font-size="13" fill="#e4e4e1">Refinement</text>
      <text x="270" y="18" font-size="12" fill="#9ca09b" text-anchor="end">Ark</text>
    </g>
    <g transform="translate(22, 348)">
      <circle cx="6" cy="14" r="4" fill="#5ee2b7"/>
      <text x="22" y="18" font-size="13" fill="#e4e4e1">Agent</text>
      <text x="270" y="18" font-size="12" fill="#9ca09b" text-anchor="end">OpenClaw</text>
    </g>
    <g transform="translate(22, 374)">
      <circle cx="6" cy="14" r="4" fill="#5ee2b7"/>
      <text x="22" y="18" font-size="13" fill="#e4e4e1">Recorder</text>
      <text x="270" y="18" font-size="12" fill="#9ca09b" text-anchor="end">Ready</text>
    </g>

    <!-- Footer -->
    <line x1="18" y1="430" x2="312" y2="430" stroke="#fff" stroke-opacity="0.08"/>
    <g transform="translate(20, 444)">
      <rect width="76" height="36" rx="9" fill="#1a1d20" stroke="#fff" stroke-opacity="0.1"/>
      <text x="38" y="22" font-size="12" fill="#cdd0cc" text-anchor="middle">Logs</text>
    </g>
    <g transform="translate(106, 444)">
      <rect width="100" height="36" rx="9" fill="#1a1d20" stroke="#fff" stroke-opacity="0.1"/>
      <text x="50" y="22" font-size="12" fill="#cdd0cc" text-anchor="middle">Settings</text>
    </g>
    <g transform="translate(216, 444)">
      <rect width="96" height="36" rx="9" fill="#1a1d20" stroke="#fff" stroke-opacity="0.1"/>
      <text x="48" y="22" font-size="12" fill="#cdd0cc" text-anchor="middle">Quit</text>
    </g>
  </g>
</svg>
