<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 540" width="380" height="540" font-family="-apple-system, 'SF Pro Text', system-ui, sans-serif">
  <defs>
    <linearGradient id="popGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26282a" stop-opacity="0.96"/>
      <stop offset="0.5" stop-color="#121316" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#0d1112" stop-opacity="0.98"/>
    </linearGradient>
    <pattern id="popGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.045"/>
    </pattern>
    <radialGradient id="popHi" cx="0.18" cy="0.05" r="0.45">
      <stop offset="0" stop-color="#7dbdff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7dbdff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Drop shadow background -->
  <rect width="380" height="540" fill="#000" fill-opacity="0"/>

  <!-- Arrow -->
  <path d="M183 14 L197 30 L169 30 Z" fill="#26282a" fill-opacity="0.96" stroke="#fff" stroke-opacity="0.13" stroke-width="1"/>

  <!-- Popover body -->
  <g transform="translate(10, 22)">
    <rect width="360" height="500" rx="18" fill="url(#popGrad)" stroke="#fff" stroke-opacity="0.13" stroke-width="1"/>
    <rect x="1" y="1" width="358" height="498" rx="17" fill="url(#popGrid)" opacity="0.5"/>
    <rect x="1" y="1" width="358" height="498" rx="17" fill="url(#popHi)"/>

    <!-- Header -->
    <text x="22" y="38" font-size="10" letter-spacing="2.5" fill="#7d8480" font-weight="700">SARAH</text>
    <text x="22" y="66" font-size="20" fill="#fafaf6" font-weight="700">Ready</text>
    <text x="22" y="86" font-size="12" fill="#9ca09b">All systems online</text>
    <circle cx="332" cy="50" r="5" fill="#5ee2b7"/>
    <circle cx="332" cy="50" r="9" fill="none" stroke="#5ee2b7" stroke-opacity="0.3"/>

    <!-- Hero panel -->
    <rect x="18" y="106" width="324" height="84" rx="13" fill="#0e1115" stroke="#fff" stroke-opacity="0.07"/>
    <text x="34" y="132" font-size="10" letter-spacing="1.8" fill="#7d8480" font-weight="700">CURRENT MODE</text>
    <text x="34" y="156" font-size="15" fill="#fafaf6" font-weight="600">Dictation</text>
    <text x="34" y="174" font-size="11" fill="#9ca09b">Right Ctrl · press to start, press again to stop</text>

    <!-- Action buttons grid -->
    <g transform="translate(18, 208)">
      <rect width="156" height="60" rx="12" fill="#5cb3ff" fill-opacity="0.13" stroke="#5cb3ff" stroke-opacity="0.4"/>
      <text x="16" y="28" font-size="10" fill="#9ec5f0" font-weight="700" letter-spacing="1.4">DICTATE</text>
      <text x="16" y="48" font-size="13" fill="#fafaf6" font-weight="600">Start recording</text>
    </g>
    <g transform="translate(186, 208)">
      <rect width="156" height="60" rx="12" fill="#d7bc84" fill-opacity="0.12" stroke="#d7bc84" stroke-opacity="0.34"/>
      <text x="16" y="28" font-size="10" fill="#d7bc84" font-weight="700" letter-spacing="1.4">COMMAND</text>
      <text x="16" y="48" font-size="13" fill="#fafaf6" font-weight="600">Run agent</text>
    </g>

    <!-- Status block -->
    <text x="22" y="304" font-size="10" letter-spacing="2.5" fill="#7d8480" font-weight="700">RUNTIME</text>
    <g transform="translate(22, 318)">
      <circle cx="6" cy="14" r="4" fill="#5ee2b7"/>
      <text x="22" y="18" font-size="13" fill="#e4e4e1">Speech</text>
      <text x="316" y="18" font-size="12" fill="#9ca09b" text-anchor="end">Volcengine</text>
    </g>
    <g transform="translate(22, 346)">
      <circle cx="6" cy="14" r="4" fill="#5ee2b7"/>
      <text x="22" y="18" font-size="13" fill="#e4e4e1">Refinement</text>
      <text x="316" y="18" font-size="12" fill="#9ca09b" text-anchor="end">Ark Doubao</text>
    </g>
    <g transform="translate(22, 374)">
      <circle cx="6" cy="14" r="4" fill="#5ee2b7"/>
      <text x="22" y="18" font-size="13" fill="#e4e4e1">Agent</text>
      <text x="316" y="18" font-size="12" fill="#9ca09b" text-anchor="end">OpenClaw Gateway</text>
    </g>
    <g transform="translate(22, 402)">
      <circle cx="6" cy="14" r="4" fill="#5ee2b7"/>
      <text x="22" y="18" font-size="13" fill="#e4e4e1">Recorder</text>
      <text x="316" y="18" font-size="12" fill="#9ca09b" text-anchor="end">Ready</text>
    </g>

    <!-- Footer -->
    <line x1="18" y1="448" x2="342" y2="448" stroke="#fff" stroke-opacity="0.08"/>
    <g transform="translate(20, 462)">
      <rect width="80" height="32" rx="9" fill="#1a1d20" stroke="#fff" stroke-opacity="0.11"/>
      <text x="40" y="21" font-size="12" fill="#cdd0cc" text-anchor="middle">Logs</text>
    </g>
    <g transform="translate(112, 462)">
      <rect width="106" height="32" rx="9" fill="#1a1d20" stroke="#fff" stroke-opacity="0.11"/>
      <text x="53" y="21" font-size="12" fill="#cdd0cc" text-anchor="middle">Settings</text>
    </g>
    <g transform="translate(232, 462)">
      <rect width="106" height="32" rx="9" fill="#1a1d20" stroke="#fff" stroke-opacity="0.11"/>
      <text x="53" y="21" font-size="12" fill="#cdd0cc" text-anchor="middle">Quit</text>
    </g>
  </g>
</svg>
