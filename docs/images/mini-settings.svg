<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 600" width="420" height="600" font-family="-apple-system, 'SF Pro Text', system-ui, sans-serif">
  <defs>
    <linearGradient id="msShellGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#272729" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#101214" stop-opacity="0.98"/>
    </linearGradient>
    <radialGradient id="msBlue" cx="0.18" cy="0" r="0.48">
      <stop offset="0" stop-color="#5cb3ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5cb3ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="msGreen" cx="0.88" cy="0.12" r="0.4">
      <stop offset="0" stop-color="#5ee2b7" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#5ee2b7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="msBrand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5cb3ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#2b5cb1" stop-opacity="0.92"/>
    </linearGradient>
    <pattern id="msGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Window with traffic lights -->
  <g>
    <rect width="420" height="600" rx="14" fill="url(#msShellGrad)" stroke="#fff" stroke-opacity="0.11" stroke-width="1"/>
    <rect width="420" height="600" rx="14" fill="url(#msBlue)"/>
    <rect width="420" height="600" rx="14" fill="url(#msGreen)"/>
    <rect width="420" height="600" rx="14" fill="url(#msGrid)" opacity="0.6"/>

    <!-- Traffic light controls -->
    <circle cx="22" cy="22" r="6" fill="#ff5f57" stroke="#000" stroke-opacity="0.2"/>
    <circle cx="42" cy="22" r="6" fill="#febc2e" stroke="#000" stroke-opacity="0.2"/>
    <circle cx="62" cy="22" r="6" fill="#28c840" stroke="#000" stroke-opacity="0.2"/>

    <!-- Header -->
    <g transform="translate(16, 56)">
      <!-- brand mark -->
      <rect width="32" height="32" rx="10" fill="url(#msBrand)"/>
      <ellipse cx="16" cy="18" rx="8" ry="6" fill="#fff" fill-opacity="0.88"/>

      <text x="44" y="14" font-size="10" letter-spacing="2.5" fill="#7d8480" font-weight="700">SARAH</text>
      <text x="44" y="30" font-size="17" fill="#fff" font-weight="700">Control Center</text>

      <!-- Status pill -->
      <g transform="translate(310, 4)">
        <rect width="80" height="26" rx="13" fill="#1a1d21" stroke="#5ee2b7" stroke-opacity="0.4"/>
        <circle cx="14" cy="13" r="4" fill="#5ee2b7"/>
        <text x="26" y="17" font-size="11" fill="#5ee2b7" font-weight="600">Ready</text>
      </g>
    </g>

    <!-- Health summary card -->
    <g transform="translate(16, 110)">
      <rect width="388" height="68" rx="13" fill="#0e1115" stroke="#fff" stroke-opacity="0.07"/>
      <circle cx="22" cy="34" r="10" fill="#5ee2b7" fill-opacity="0.18" stroke="#5ee2b7" stroke-opacity="0.6"/>
      <path d="M17 34 L21 38 L28 30" stroke="#5ee2b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="44" y="28" font-size="10" letter-spacing="1.5" fill="#7d8480" font-weight="700">HEALTH SUMMARY</text>
      <text x="44" y="46" font-size="14" fill="#fafaf6" font-weight="600">All systems online · 4 of 4 components</text>
      <text x="44" y="60" font-size="11" fill="#9ca09b">Speech, Refinement, Agent and Recorder are ready</text>
    </g>

    <!-- Settings cards 2x2 -->
    <g transform="translate(16, 194)">
      <text font-size="10" letter-spacing="2" fill="#7d8480" font-weight="700">CORE SERVICES</text>

      <!-- Card 1 -->
      <g transform="translate(0, 16)">
        <rect width="186" height="86" rx="12" fill="#161a1d" stroke="#fff" stroke-opacity="0.08"/>
        <circle cx="18" cy="22" r="4" fill="#5ee2b7"/>
        <text x="32" y="26" font-size="12" fill="#fafaf6" font-weight="600">Speech</text>
        <text x="14" y="50" font-size="11" fill="#9ca09b">Volcengine streaming</text>
        <text x="14" y="68" font-size="10" letter-spacing="1.4" fill="#7d8480">CONFIGURED</text>
      </g>
      <!-- Card 2 -->
      <g transform="translate(202, 16)">
        <rect width="186" height="86" rx="12" fill="#161a1d" stroke="#fff" stroke-opacity="0.08"/>
        <circle cx="18" cy="22" r="4" fill="#5ee2b7"/>
        <text x="32" y="26" font-size="12" fill="#fafaf6" font-weight="600">Refinement</text>
        <text x="14" y="50" font-size="11" fill="#9ca09b">Ark Doubao Lite</text>
        <text x="14" y="68" font-size="10" letter-spacing="1.4" fill="#7d8480">CONFIGURED</text>
      </g>
      <!-- Card 3 -->
      <g transform="translate(0, 116)">
        <rect width="186" height="86" rx="12" fill="#161a1d" stroke="#fff" stroke-opacity="0.08"/>
        <circle cx="18" cy="22" r="4" fill="#5ee2b7"/>
        <text x="32" y="26" font-size="12" fill="#fafaf6" font-weight="600">Agent</text>
        <text x="14" y="50" font-size="11" fill="#9ca09b">OpenClaw Gateway</text>
        <text x="14" y="68" font-size="10" letter-spacing="1.4" fill="#7d8480">PORT 4096</text>
      </g>
      <!-- Card 4 -->
      <g transform="translate(202, 116)">
        <rect width="186" height="86" rx="12" fill="#161a1d" stroke="#fff" stroke-opacity="0.08"/>
        <circle cx="18" cy="22" r="4" fill="#5ee2b7"/>
        <text x="32" y="26" font-size="12" fill="#fafaf6" font-weight="600">Recorder</text>
        <text x="14" y="50" font-size="11" fill="#9ca09b">PCM 16kHz mono</text>
        <text x="14" y="68" font-size="10" letter-spacing="1.4" fill="#7d8480">READY</text>
      </g>
    </g>

    <!-- Hotkey deck -->
    <g transform="translate(16, 422)">
      <text font-size="10" letter-spacing="2" fill="#7d8480" font-weight="700">HOTKEYS · BASE TRIGGER = RIGHT CTRL</text>
      <g transform="translate(0, 16)">
        <rect width="124" height="56" rx="11" fill="#161a1d" stroke="#5cb3ff" stroke-opacity="0.4"/>
        <text x="14" y="26" font-size="11" fill="#9ec5f0" font-weight="700" letter-spacing="1.2">DICTATE</text>
        <text x="14" y="44" font-size="11" fill="#cdd0cc" font-family="ui-monospace, 'SF Mono', monospace">Right Ctrl</text>
      </g>
      <g transform="translate(132, 16)">
        <rect width="124" height="56" rx="11" fill="#161a1d" stroke="#d7bc84" stroke-opacity="0.4"/>
        <text x="14" y="26" font-size="11" fill="#d7bc84" font-weight="700" letter-spacing="1.2">COMMAND</text>
        <text x="14" y="44" font-size="11" fill="#cdd0cc" font-family="ui-monospace, 'SF Mono', monospace">+ Shift</text>
      </g>
      <g transform="translate(264, 16)">
        <rect width="124" height="56" rx="11" fill="#161a1d" stroke="#5ee2b7" stroke-opacity="0.4"/>
        <text x="14" y="26" font-size="11" fill="#5ee2b7" font-weight="700" letter-spacing="1.2">QUICK ASK</text>
        <text x="14" y="44" font-size="11" fill="#cdd0cc" font-family="ui-monospace, 'SF Mono', monospace">+ Space</text>
      </g>
    </g>

    <!-- Footer actions -->
    <g transform="translate(16, 528)">
      <rect width="80" height="32" rx="9" fill="#1a1d20" stroke="#fff" stroke-opacity="0.11"/>
      <text x="40" y="20" font-size="11" fill="#cdd0cc" text-anchor="middle">Refresh</text>
    </g>
    <g transform="translate(102, 528)">
      <rect width="80" height="32" rx="9" fill="#1a1d20" stroke="#fff" stroke-opacity="0.11"/>
      <text x="40" y="20" font-size="11" fill="#cdd0cc" text-anchor="middle">Logs</text>
    </g>
    <g transform="translate(188, 528)">
      <rect width="124" height="32" rx="9" fill="#1a1d20" stroke="#fff" stroke-opacity="0.11"/>
      <text x="62" y="20" font-size="11" fill="#cdd0cc" text-anchor="middle">Fix Permissions</text>
    </g>
    <g transform="translate(318, 528)">
      <rect width="86" height="32" rx="9" fill="#1a1d20" stroke="#fff" stroke-opacity="0.11"/>
      <text x="43" y="20" font-size="11" fill="#cdd0cc" text-anchor="middle">Quit</text>
    </g>
  </g>
</svg>
